    <style>
      /* ---- Preloader (inline so it paints before any JS/CSS bundle) ---- */
      @property --pl-n {
        syntax: '<integer>';
        inherits: false;
        initial-value: 0;
      }
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #050505;
        overflow: hidden;
        transition: opacity 0.55s ease, visibility 0.55s ease;
      }
      #preloader.preloader-done {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #preloader .pl-grid {
        position: absolute;
        inset: 0;
        background-image: linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
        background-size: 64px 64px;
        mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
        -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
        animation: pl-drift 24s linear infinite;
      }
      #preloader .pl-glow {
        position: absolute;
        width: 420px;
        height: 420px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(201, 255, 61, 0.12), transparent 65%);
        animation: pl-pulse 2.4s ease-in-out infinite;
      }
      #preloader .pl-center {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 26px;
        padding: 0 24px;
      }
      #preloader .pl-logo {
        position: relative;
        width: clamp(84px, 18vw, 116px);
        height: clamp(84px, 18vw, 116px);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transform: scale(0.6);
        animation: pl-pop 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
      }
      #preloader .pl-logo img {
        width: 78%;
        height: 78%;
        object-fit: cover;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: 0 0 34px rgba(201, 255, 61, 0.25), 0 8px 30px rgba(0, 0, 0, 0.5);
      }
      #preloader .pl-logo svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        animation: pl-spin 10s linear infinite;
      }
      #preloader .pl-track {
        position: relative;
        width: min(300px, 64vw);
        height: 2px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        overflow: hidden;
      }
      #preloader .pl-bar {
        position: absolute;
        inset: 0;
        transform-origin: left;
        transform: scaleX(0);
        background: #c9ff3d;
        box-shadow: 0 0 16px rgba(201, 255, 61, 0.6);
        animation: pl-fill 1.1s cubic-bezier(0.65, 0, 0.35, 1) 0.15s forwards;
      }
      #preloader .pl-meta {
        display: flex;
        width: min(300px, 64vw);
        justify-content: space-between;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 11px;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.45);
      }
      #preloader .pl-count {
        color: #c9ff3d;
        animation: pl-count 1.1s cubic-bezier(0.65, 0, 0.35, 1) 0.15s forwards;
      }
      #preloader .pl-count::after {
        counter-reset: pln var(--pl-n);
        content: counter(pln) '%';
      }
      #preloader .pl-corner {
        position: absolute;
        width: 22px;
        height: 22px;
        border: 1px solid rgba(201, 255, 61, 0.45);
      }
      #preloader .pl-corner.tl { top: 22px; left: 22px; border-right: 0; border-bottom: 0; }
      #preloader .pl-corner.tr { top: 22px; right: 22px; border-left: 0; border-bottom: 0; }
      #preloader .pl-corner.bl { bottom: 22px; left: 22px; border-right: 0; border-top: 0; }
      #preloader .pl-corner.br { bottom: 22px; right: 22px; border-left: 0; border-top: 0; }
      @keyframes pl-pop {
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes pl-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pl-fill {
        to { transform: scaleX(1); }
      }
      @keyframes pl-count {
        to { --pl-n: 100; }
      }
      @keyframes pl-pulse {
        0%, 100% { opacity: 0.5; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.12); }
      }
      @keyframes pl-drift {
        from { background-position: 0 0; }
        to { background-position: 64px 64px; }
      }
      @media (prefers-reduced-motion: reduce) {
        #preloader .pl-logo { opacity: 1; transform: none; animation: none; }
        #preloader .pl-logo svg { animation: none; }
        #preloader .pl-bar { transform: scaleX(1); animation: none; }
        #preloader .pl-grid, #preloader .pl-glow { animation: none; }
      }
    </style>
  </head>
